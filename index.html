<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="game-body">

<!-- TOP ACTIONS -->
<div class="top-actions">
    <button onclick="goRegister()">Create Account</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- THEME BUTTON -->
<div class="top-controls">
    <button onclick="toggleTheme()" id="themeToggle">
        ☀️ Light Mode
    </button>
</div>

<!-- GAME CONTAINER -->
<div class="container">

    <div class="top-bar">
        <h1>⚡ Typing Game</h1>
    </div>

    <p id="userLabel">Player</p>

    <div id="progressBar"></div>

    <div id="textDisplay">Click Start to begin</div>

    <textarea id="inputBox" placeholder="Type here..."></textarea>

    <button id="startBtn">Start Game</button>
    <button id="restartBtn">Restart</button>

    <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
    </select>

    <h3 id="countdown"></h3>

    <div class="stats">
        <p>⏱ Time: <span id="time">0</span>s</p>
        <p>⚡ WPM: <span id="wpm">0</span></p>
        <p>🎯 Accuracy: <span id="accuracy">0</span>%</p>
        <p>🔥 Streak: <span id="streak">0</span></p>
        <p>🔥 Combo: <span id="combo">0</span></p>
    </div>

    <p>🏆 Best WPM: <span id="bestWpm">0</span></p>

    <audio id="typeSound"
        src="https://www.soundjay.com/button/sounds/button-16.mp3">
    </audio>

</div>

<script src="script.js"></script>
</body>
</html>
