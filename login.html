<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Typing Game</title>
    <link rel="stylesheet" href="style.css">
    <script>if(localStorage.getItem("theme")==="light"){document.documentElement.classList.add("light-mode");}</script>
</head>
<body>

<a href="index.html" class="back-btn">← Back</a>

<div class="auth-wrapper">
    <div class="auth-container">

        <h2>⚡ Welcome Back</h2>
        <p class="auth-subtitle">Log in to track your progress</p>

        <input id="logUser" placeholder="Username" autocomplete="username">
        <input id="logPass" type="password" placeholder="Password" autocomplete="current-password">

        <button onclick="login()">Login →</button>

        <p id="loginMsg" style="color:var(--danger);font-size:13px;min-height:18px;font-family:'Space Mono',monospace;"></p>

        <p><a href="reset-password.html">Forgot password?</a></p>
        <p>No account? <a href="register.html">Register</a></p>

    </div>
</div>

<script src="script.js"></script>
<script>
    // Allow Enter key to submit
    document.addEventListener("keydown", e => {
        if (e.key === "Enter") login();
    });
</script>
</body>
</html>
