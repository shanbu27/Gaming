<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Typing Game</title>
    <link rel="stylesheet" href="style.css">
    <script>if(localStorage.getItem("theme")==="light"){document.documentElement.classList.add("light-mode");}</script>
</head>
<body>

<a href="login.html" class="back-btn">← Back to Login</a>

<div class="auth-wrapper">
    <div class="auth-container">

        <h2>🔐 Reset Password</h2>
        <p class="auth-subtitle">Enter your username and choose a new password</p>

        <input id="resetUser"    placeholder="Username">
        <input id="resetPass"    type="password" placeholder="New Password">
        <input id="resetConfirm" type="password" placeholder="Confirm New Password">

        <button onclick="resetPassword()">Reset Password →</button>

        <p id="resetMsg"></p>

        <p><a href="login.html">Back to Login</a></p>

    </div>
</div>

<script src="script.js"></script>
<script>
    document.addEventListener("keydown", e => {
        if (e.key === "Enter") resetPassword();
    });
</script>
</body>
</html>
